    <!-- EARLY TENANT DETECTION: Runs BEFORE any content renders -->
    <script>
      (function() {
        var h = location.hostname.toLowerCase().replace(/^www\./, '');
        var isPlatform = h === 'homeofsmm.com' || h === 'smmpilot.online';
        var isDev = h.includes('lovable.app') || h.includes('lovableproject.com') || h === 'localhost' || h === '127.0.0.1' || h.includes('replit.dev') || h.includes('repl.co') || h.includes('replit.app');
        
        if (!isPlatform && !isDev) {
          // TENANT DOMAIN - Neutralize all platform branding immediately
          document.title = 'Loading...';
          
          // Mark as tenant for later use
          window.__IS_TENANT_DOMAIN__ = true;
          
          // Hide document until React loads to prevent any flash
          document.documentElement.style.visibility = 'hidden';
          document.documentElement.style.opacity = '0';
          
          // AGGRESSIVE: Remove ALL existing favicons immediately (before they load)
          var existingFavicons = document.querySelectorAll('link[rel*="icon"]');
          for (var i = 0; i < existingFavicons.length; i++) {
            existingFavicons[i].parentNode.removeChild(existingFavicons[i]);
          }
        }
      })();
    </script>
    
    <!-- Platform-only meta tags (will be removed for tenants by cleanup script) -->
    <title data-platform-only>HOME OF SMM: Create and Manage Your Own SMM Panel</title>
    <meta name="description" content="Launch your own SMM panel with Home of SMM. Get custom branding, automated orders, multiple payment gateways, and real-time analytics to grow revenue." data-platform-only />

    <!-- Critical inline styles for initial render - prevents FOUC and improves FCP -->
    <style>

      body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;background:hsl(var(--background));color:hsl(var(--foreground))}

      @keyframes spin{to{transform:rotate(360deg)}}
      .animate-spin{animation:spin 1s linear infinite}
    </style>
    
    <!-- Google Fonts - Non-render blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
    
    <!-- Secondary fonts loaded async after initial render -->
    <script>
      (function() {
        var secondaryFonts = document.createElement('link');
        secondaryFonts.rel = 'stylesheet';
        secondaryFonts.href = 'https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800&family=Raleway:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap';
        if ('requestIdleCallback' in window) {
          requestIdleCallback(function() { document.head.appendChild(secondaryFonts); });
        } else {
          setTimeout(function() { document.head.appendChild(secondaryFonts); }, 100);
        }
      })();
    </script>

    <!-- Favicon handling: Conditional based on domain type -->
    <script>
      (function() {
        if (window.__IS_TENANT_DOMAIN__) {
          // For tenants: Insert .ico favicon for Google crawler compatibility
          var link = document.createElement('link');
          link.rel = 'icon';
          link.type = 'image/x-icon';
          link.href = '/default-tenant-favicon.ico';
          document.head.appendChild(link);
          
          // Also add shortcut icon (legacy support)
          var shortcut = document.createElement('link');
          shortcut.rel = 'shortcut icon';
          shortcut.type = 'image/x-icon';
          shortcut.href = '/default-tenant-favicon.ico';
          document.head.appendChild(shortcut);
          
          // Add apple touch icon
          var apple = document.createElement('link');
          apple.rel = 'apple-touch-icon';
          apple.sizes = '180x180';
          apple.href = '/default-panel-apple-touch-icon.png';
          document.head.appendChild(apple);
        }
      })();
    </script>
    
    <!-- Platform favicon links (these will be removed for tenants) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" data-platform-only />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" data-platform-only />
    <link rel="icon" type="image/x-icon" sizes="32x32" href="/favicon.ico" data-platform-only />
    <link rel="icon" type="image/x-icon" sizes="16x16" href="/favicon.ico" data-platform-only />
    
    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    
    <!-- Canonical URL (platform-only, replaced for tenants) -->
    <link rel="canonical" href="https://homeofsmm.com/" data-platform-only />
    
    <!-- CLEANUP SCRIPT: Runs after favicon links are declared -->
    <script>
      (function() {
        if (window.__IS_TENANT_DOMAIN__) {
          // Remove all platform-only meta tags and links
          var platformOnly = document.querySelectorAll('[data-platform-only]');
          for (var i = 0; i < platformOnly.length; i++) {
            platformOnly[i].parentNode.removeChild(platformOnly[i]);
          }
          
          // Ensure tenant favicon.ico exists
          var hasTenantFavicon = document.querySelector('link[href*="default-tenant-favicon.ico"]');
          if (!hasTenantFavicon) {
            var link = document.createElement('link');
            link.rel = 'icon';
            link.type = 'image/x-icon';
            link.href = '/default-tenant-favicon.ico';
            document.head.insertBefore(link, document.head.firstChild);
          }
        }
      })();
    </script>
