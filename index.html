<!DOCTYPE html>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- EARLY TENANT DETECTION: Runs BEFORE any content renders -->
    <script>
      (function() {
        var h = location.hostname.toLowerCase().replace(/^www\./, '');
        var isPlatform = h === 'homeofsmm.com' || h === 'smmpilot.online';
        var isDev = h.includes('lovable.app') || h.includes('lovableproject.com') || h === 'localhost' || h === '127.0.0.1';
        
        if (!isPlatform && !isDev) {
          // TENANT DOMAIN - Neutralize all platform branding immediately
          document.title = 'Loading...';
          
          // Mark as tenant for later use
          window.__IS_TENANT_DOMAIN__ = true;
          
          // Hide document until React loads to prevent any flash
          document.documentElement.style.visibility = 'hidden';
          document.documentElement.style.opacity = '0';
        }
      })();
    </script>
    
    <!-- Platform-only meta tags (will be removed/replaced for tenants by React) -->
    <title>HOME OF SMM - #1 SMM Panel Platform | Create Your Own SMM Panel</title>

    <!-- Second script to clean up platform-only tags for tenant domains -->
    <script>
      (function() {
        if (window.__IS_TENANT_DOMAIN__) {
          // Remove all platform-only meta tags
          document.querySelectorAll('[data-platform-only]').forEach(function(el) {
            el.remove();
          });
          
          // Remove existing favicons and add neutral one
          document.querySelectorAll('link[rel*="icon"]').forEach(function(el) {
            el.remove();
          });
          
          var favicon = document.createElement('link');
          favicon.rel = 'icon';
          favicon.type = 'image/png';
          favicon.href = '/default-panel-favicon.png';
          document.head.appendChild(favicon);
        }
      })();
    </script>
