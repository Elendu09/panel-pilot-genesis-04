<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- EARLY TENANT DETECTION: Runs BEFORE any content renders -->
    <script>
      (function() {
        var h = location.hostname.toLowerCase().replace(/^www\./, '');
        var isPlatform = h === 'homeofsmm.com' || h === 'smmpilot.online';
        var isDev = h.includes('lovable.app') || h.includes('lovableproject.com') || h === 'localhost' || h === '127.0.0.1';
        
        if (!isPlatform && !isDev) {
          // TENANT DOMAIN - Neutralize all platform branding immediately
          document.title = 'Loading...';
          
          // Mark as tenant for later use
          window.__IS_TENANT_DOMAIN__ = true;
          
          // Hide document until React loads to prevent any flash
          document.documentElement.style.visibility = 'hidden';
          document.documentElement.style.opacity = '0';
          
          // AGGRESSIVE: Remove ALL existing favicons immediately (before they load)
          // This runs synchronously before the browser even tries to fetch /favicon.ico
          var existingFavicons = document.querySelectorAll('link[rel*="icon"]');
          for (var i = 0; i < existingFavicons.length; i++) {
            existingFavicons[i].parentNode.removeChild(existingFavicons[i]);
          }
        }
      })();
    </script>
    
    <!-- Platform-only meta tags (will be removed/replaced for tenants by React) -->
    <title data-platform-only>HOME OF SMM - #1 SMM Panel Platform | Create Your Own SMM Panel</title>
    <meta name="description" content="Create and manage your own SMM panel with HOME OF SMM. Start your social media marketing business with custom branding, automated orders, multiple payment gateways, and powerful analytics. Join 10,000+ panel owners today." data-platform-only>
    <meta name="keywords" content="SMM panel, SMM panel script, create SMM panel, best SMM panel, SMM reseller panel, SMM panel software, social media marketing panel, white label SMM panel, cheapest SMM panel" data-platform-only>
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Luckiest+Guy&family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800&family=Raleway:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Author & Publisher (platform-only, replaced for tenants) -->
    <meta name="author" content="HOME OF SMM" data-platform-only />
    <meta name="publisher" content="HOME OF SMM" data-platform-only />
    <meta name="copyright" content="HOME OF SMM" data-platform-only />
    
    <!-- Robots & Indexing -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    
    <!-- Language & Distribution -->
    <meta name="language" content="English" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />
    <meta name="revisit-after" content="1 days" />
    
    <!-- Geo Tags -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="United States" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#6366F1" />
    <meta name="msapplication-TileColor" content="#6366F1" />
    <meta name="msapplication-navbutton-color" content="#6366F1" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Mobile Web App (platform-only, replaced for tenants) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="HOME OF SMM" data-platform-only />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Open Graph (platform-only, replaced for tenants) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="HOME OF SMM" data-platform-only />
    <meta property="og:title" content="HOME OF SMM - #1 SMM Panel Platform | Create Your Own SMM Panel" data-platform-only />
    <meta property="og:description" content="Create and manage your own SMM panel with HOME OF SMM. Start your social media marketing business with custom branding, automated orders, multiple payment gateways, and powerful analytics." data-platform-only />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/a8nFu1Vlx5VQr6NAikq0H0XDcv42/social-images/social-1767449564584-HOME OF SMM SCREENSHOT.png" data-platform-only />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="HOME OF SMM - SMM Panel Platform" data-platform-only />
    
    <!-- Twitter Card (platform-only, replaced for tenants) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@homeofsmm" data-platform-only />
    <meta name="twitter:creator" content="@homeofsmm" data-platform-only />
    <meta name="twitter:title" content="HOME OF SMM - #1 SMM Panel Platform" data-platform-only />
    <meta name="twitter:description" content="Create and manage your own SMM panel with HOME OF SMM - the most advanced white-label SMM panel platform." data-platform-only />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/a8nFu1Vlx5VQr6NAikq0H0XDcv42/social-images/social-1767449564584-HOME OF SMM SCREENSHOT.png" data-platform-only />
    
    <!-- Favicon (platform-only, MUST be conditional for tenant domains) -->
    <script>
      // Insert correct favicon BEFORE the link tags are parsed
      (function() {
        if (window.__IS_TENANT_DOMAIN__) {
          // For tenants: immediately insert neutral favicon FIRST
          var link = document.createElement('link');
          link.rel = 'icon';
          link.type = 'image/png';
          link.href = '/default-panel-favicon.png';
          document.head.appendChild(link);
        }
      })();
    </script>
    
    <!-- Platform favicon links (these will be removed for tenants) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" data-platform-only />
    <link rel="apple-touch-icon" sizes="180x180" href="/default-panel-favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" data-platform-only />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.ico" data-platform-only />
    
    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    
    <!-- Canonical URL (platform-only, replaced for tenants) -->
    <link rel="canonical" href="https://homeofsmm.com/" data-platform-only />
    
    <!-- CLEANUP SCRIPT: Runs after favicon links are declared -->
    <script>
      (function() {
        if (window.__IS_TENANT_DOMAIN__) {
          // Remove all platform-only meta tags and links
          var platformOnly = document.querySelectorAll('[data-platform-only]');
          for (var i = 0; i < platformOnly.length; i++) {
            platformOnly[i].parentNode.removeChild(platformOnly[i]);
          }
          
          // Double-check: remove any remaining platform favicons
          var favicons = document.querySelectorAll('link[rel*="icon"][href*="favicon.ico"]');
          for (var j = 0; j < favicons.length; j++) {
            favicons[j].parentNode.removeChild(favicons[j]);
          }
          
          // Ensure neutral favicon exists
          var hasNeutralFavicon = document.querySelector('link[href*="default-panel-favicon"]');
          if (!hasNeutralFavicon) {
            var link = document.createElement('link');
            link.rel = 'icon';
            link.type = 'image/png';
            link.href = '/default-panel-favicon.png';
            document.head.insertBefore(link, document.head.firstChild);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
