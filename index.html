    <!-- TENANT CLEANUP & INJECTION SCRIPT: removes platform branding and adds tenant defaults exactly once -->
    <script>
      (function() {
        // If not a tenant domain, do nothing extra (platform experience remains)
        if (!window.__IS_TENANT_DOMAIN__) return;

        // Remove all platform-only meta tags, links, and elements that shouldn’t persist on tenants
        document.querySelectorAll('[data-platform-only]').forEach(function(el) {
          el.remove();
        });

        // Ensure no stray favicons remain (this is a safety belt against timing issues in browsers)
        document.querySelectorAll('link[rel*="icon"]').forEach(function(el) {
          el.remove();
        });

        // Insert tenant favicon(s) — ICO viewed best by search crawlers historically
        var favicon = document.createElement('link');
        favicon.rel = 'icon';
        favicon.type = 'image/x-icon';
        favicon.href = '/default-tenant-favicon.ico';
        document.head.appendChild(favicon);

        var shortcut = document.createElement('link');
        shortcut.rel = 'shortcut icon';
        shortcut.type = 'image/x-icon';
        shortcut.href = '/default-tenant-favicon.ico';
        document.head.appendChild(shortcut);

        var apple = document.createElement('link');
        apple.rel = 'apple-touch-icon';
        apple.sizes = '180x180';
        apple.href = '/default-panel-apple-touch-icon.png';
        document.head.appendChild(apple);

        // SAFE SEO DEFAULTS FOR TENANTS: prevent inadvertent indexing of tenant sites with platform content.
        // Tenants can (and should) adjust robots, theme color, canonical, title, social meta, etc.
        // through their app logic (React Helmet, custom config, edge renderer, or server-side rendering).
        var robots = document.createElement('meta');
        robots.name = 'robots';
        robots.content = 'noindex, nofollow';
        document.head.appendChild(robots);

        // Neutral theme color to avoid platform purple bleeding into browser chrome
        var theme = document.querySelector('meta[name="theme-color"]') || document.createElement('meta');
        theme.name = 'theme-color';
        theme.content = '#111827';
        document.head.appendChild(theme);

        // Optional: remove platform canonical if it lingered (precautionary)
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) {
          canonical.remove();
        }
      })();
    </script>

    <!-- IMPORTANT: Ensure the hidden HTML is made visible when React has rendered (prevents infinite hidden screen if hydration fails) -->
    <script>
      (function() {
        // Only relevant for tenants (platform users can see immediately)
        if (!window.__IS_TENANT_DOMAIN__) return;

        // Callback that un-hides the document when the app finishes rendering
        function showApp() {
          document.documentElement.style.visibility = 'visible';
          document.documentElement.style.opacity = '1';
          document.documentElement.style.transition = 'opacity 0.15s ease';
        }

        // Try to respond to the React DOM being present (this uses a simple and reliable timing pattern).
        // A more robust alternative is emitting a DOM event from your React bootstrap (e.g., window.__APP_READY = true)
        var checkInterval = setInterval(function() {
          if (document.getElementById('root') && document.getElementById('root').children.length > 0) {
            clearInterval(checkInterval);
            showApp();
          }
        }, 5);
        // Fallback: if the app takes longer than 5 seconds for some reason, recover anyway
        setTimeout(function() {
          clearInterval(checkInterval);
          showApp();
        }, 5000);
      })();
    </script>
